name: Resilience Test Only (Reusable)

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Nome do microserviço (catalogo, pagamento, pedido)'
        required: true
        type: string
      run_pod_kill:
        description: 'Executar experimento PodKill?'
        required: false
        type: boolean
        default: true
      run_network_delay:
        description: 'Executar experimento NetworkDelay?'
        required: false
        type: boolean
        default: true
      run_cpu_stress:
        description: 'Executar experimento CPUStress?'
        required: false
        type: boolean
        default: false
      chaos_duration_seconds:
        description: 'Duração em segundos para cada experimento com scheduler'
        required: false
        type: number
        default: 60

permissions:
  id-token: write
  contents: read

env:
  SERVICE_NAME: ${{ inputs.service_name }}
  CHAOS_NAMESPACE: app
  CHAOS_DURATION: ${{ inputs.chaos_duration_seconds }}

jobs:
  resilience-test:
    name: Resilience Test (Chaos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone shared toolkit
        run: git clone --depth 1 https://github.com/Dorigao-LTDA/ct-common.git /tmp/ct-common

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Generate k6 env from NFR
        run: |
          python3 /tmp/ct-common/scripts/nfr-to-env.py --nfr nfr.yaml \
            --output nfr-env.sh --service ${{ env.SERVICE_NAME }}
          sed 's/^export //' nfr-env.sh > /tmp/k6-env.txt

      - name: Ensure Chaos Mesh is installed
        run: |
          if kubectl get namespace chaos-mesh &>/dev/null; then
            echo "Chaos Mesh namespace found"
          else
            echo "WARNING: chaos-mesh namespace not found. Installing..."
            kubectl create namespace chaos-mesh 2>/dev/null || true
          fi
          kubectl get pods -n chaos-mesh --no-headers 2>/dev/null | head -5 || \
            echo "No Chaos Mesh pods found - experiments may fail"

      # ---------------------------------------------------------------
      # Helper: run one chaos experiment with k6 monitoring + recovery
      # ---------------------------------------------------------------
      # This step creates a script that wraps the chaos + recovery + k6
      # logic so each experiment can reuse it without duplicating steps.
      - name: Write chaos runner script
        shell: bash
        run: |
          cat > /tmp/run-chaos-experiment.sh << 'RUNNER'
          #!/usr/bin/env bash
          set -euo pipefail
          #
          # run-chaos-experiment <manifest> <experiment_name> <duration_seconds>
          #
          # 1. Applies the chaos manifest
          # 2. Starts k6 smoke in background (traffic generator)
          # 3. Waits for chaos duration
          # 4. Stops k6
          # 5. Waits for pod recovery (polls until Ready)
          # 6. Records recovery_time_seconds
          # 7. Cleans up (deletes the manifest)
          # Writes: {chaos-results/<exp_name>.json, chaos-recovery.json entries}
          #
          MANIFEST="$1"
          EXP_NAME="$2"
          DURATION="$3"
          SERVICE="$4"

          mkdir -p /tmp/chaos-results

          # Start k6 smoke in background as traffic generator
          K6_START=$(date +%s%N)
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e BASE_URL=http://localhost:8080 \
            --env-file /tmp/k6-env.txt \
            --name "k6-${EXP_NAME}" \
            grafana/k6 run perf/smoke.js \
              --out json=/tmp/chaos-results/${EXP_NAME}.json \
              --tag test_type=chaos \
              --tag chaos_experiment=${EXP_NAME} &
          K6_PID=$!

          # Allow k6 to reach service before chaos
          sleep 3

          # Apply chaos
          echo "=== Applying ${EXP_NAME} ==="
          kubectl apply -f "${MANIFEST}"

          # Wait for chaos duration
          echo "=== Waiting ${DURATION}s for chaos ${EXP_NAME} ==="
          sleep "${DURATION}"

          # If the manifest uses a scheduler, Chaos Mesh handles duration automatically.
          # We just wait the specified duration, then stop k6.
          echo "=== Stopping k6 for ${EXP_NAME} ==="
          kill "${K6_PID}" 2>/dev/null || true
          wait "${K6_PID}" 2>/dev/null || true
          K6_END=$(date +%s%N)

          # Wait for all pods of this service to be Ready
          echo "=== Waiting for recovery after ${EXP_NAME} ==="
          RECOVERY_START=$(date +%s%N)
          for i in $(seq 1 120); do
            POD_STATUS=$(kubectl get pods -n app \
              -l app="${SERVICE}" \
              -o jsonpath='{.items[*].status.phase}' 2>/dev/null)
            ALL_RUNNING=true
            for status in $POD_STATUS; do
              if [ "$status" != "Running" ]; then ALL_RUNNING=false; break; fi
            done
            if $ALL_RUNNING; then
              ALL_READY=true
              READY_STATUS=$(kubectl get pods -n app \
                -l app="${SERVICE}" \
                -o jsonpath='{.items[*].status.containerStatuses[*].ready}' 2>/dev/null)
              for ready in $READY_STATUS; do
                if [ "$ready" != "true" ]; then ALL_READY=false; break; fi
              done
              if $ALL_READY; then
                RECOVERY_END=$(date +%s%N)
                RECOVERY_SEC=$(( (RECOVERY_END - RECOVERY_START) / 1000000000 ))
                echo "Recovery complete in ${RECOVERY_SEC}s"
                break
              fi
            fi
            sleep 2
          done

          # Cleanup chaos
          echo "=== Cleaning up ${EXP_NAME} ==="
          kubectl delete -f "${MANIFEST}" --ignore-not-found --wait=true 2>/dev/null || true

          # Write recovery time
          RECOVERY_SEC=${RECOVERY_SEC:--1}
          echo "${EXP_NAME}: ${RECOVERY_SEC}s" >> /tmp/chaos-recovery-times.txt
          RUNNER

          chmod +x /tmp/run-chaos-experiment.sh

      - name: Port-forward to AKS (persistent)
        run: |
          kubectl port-forward -n app svc/${{ env.SERVICE_NAME }} 8080:8080 &
          PF_PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/health; then
              echo "Tunnel ready after ${i} attempts"
              echo "$PF_PID" > /tmp/pf-pid.txt
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Tunnel failed after 30s" >&2
          exit 1

      # =============================================================
      # Experiment: k6 Baseline (before any chaos)
      # =============================================================
      - name: Baseline k6 before chaos
        env:
          BASE_URL: http://localhost:8080
        run: |
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BASE_URL \
            --env-file /tmp/k6-env.txt \
            grafana/k6 run perf/smoke.js \
              --out json=baseline-before-chaos.json \
              --tag test_type=baseline_before_chaos

      # =============================================================
      # Experiment 1: Pod Kill
      # =============================================================
      - name: Chaos — Pod Kill
        if: ${{ inputs.run_pod_kill == true }}
        env:
          CHAOS_MANIFEST: chaos/pod-kill.yaml
          CHAOS_EXP_NAME: pod-kill
        run: |
          /tmp/run-chaos-experiment.sh \
            "${{ env.CHAOS_MANIFEST }}" \
            "${{ env.CHAOS_EXP_NAME }}" \
            "${{ env.CHAOS_DURATION }}" \
            "${{ env.SERVICE_NAME }}"

      # =============================================================
      # Experiment 2: Network Delay
      # =============================================================
      - name: Chaos — Network Delay
        if: ${{ inputs.run_network_delay == true }}
        env:
          CHAOS_MANIFEST: chaos/network-delay.yaml
          CHAOS_EXP_NAME: network-delay
        run: |
          /tmp/run-chaos-experiment.sh \
            "${{ env.CHAOS_MANIFEST }}" \
            "${{ env.CHAOS_EXP_NAME }}" \
            "${{ env.CHAOS_DURATION }}" \
            "${{ env.SERVICE_NAME }}"

      # =============================================================
      # Experiment 3: CPU Stress
      # =============================================================
      - name: Chaos — CPU Stress
        if: ${{ inputs.run_cpu_stress == true }}
        env:
          CHAOS_MANIFEST: chaos/pod-cpu-stress.yaml
          CHAOS_EXP_NAME: pod-cpu-stress
        run: |
          /tmp/run-chaos-experiment.sh \
            "${{ env.CHAOS_MANIFEST }}" \
            "${{ env.CHAOS_EXP_NAME }}" \
            "${{ env.CHAOS_DURATION }}" \
            "${{ env.SERVICE_NAME }}"

      # =============================================================
      # Consolidate results
      # =============================================================
      - name: Consolidate chaos results
        run: |
          # Build recovery JSON from collected times
          RECOVERY_JSON="{"
          FIRST=true
          if [ -f /tmp/chaos-recovery-times.txt ]; then
            while IFS=':' read -r exp_name recovery_sec; do
              exp_name=$(echo "$exp_name" | xargs)
              recovery_sec=$(echo "$recovery_sec" | xargs | sed 's/s//')
              if [ "$FIRST" = true ]; then FIRST=false; else RECOVERY_JSON+=","; fi
              RECOVERY_JSON+="\"${exp_name}\": {\"recovery_time_seconds\": ${recovery_sec}}"
            done < /tmp/chaos-recovery-times.txt
          fi
          RECOVERY_JSON+="}"
          echo "$RECOVERY_JSON" > /tmp/chaos-recovery.json
          echo "=== Recovery times ==="
          cat /tmp/chaos-recovery.json

      - name: Upload chaos k6 results
        uses: actions/upload-artifact@v4
        with:
          name: chaos-results
          path: |
            /tmp/chaos-results/*.json
            /tmp/chaos-recovery.json
            baseline-before-chaos.json

      # =============================================================
      # Cleanup
      # =============================================================
      - name: Cleanup
        if: always()
        run: |
          # Kill any leftover k6 containers
          docker rm -f $(docker ps -aq --filter name=k6-) 2>/dev/null || true
          # Kill port-forward
          if [ -f /tmp/pf-pid.txt ]; then
            kill $(cat /tmp/pf-pid.txt) 2>/dev/null || true
          fi
          pkill -f "port-forward.*svc/${{ env.SERVICE_NAME }}" 2>/dev/null || true
          # Remove any leftover chaos resources
          kubectl delete podchaos --all -n ${{ env.CHAOS_NAMESPACE }} --ignore-not-found 2>/dev/null || true
          kubectl delete networkchaos --all -n ${{ env.CHAOS_NAMESPACE }} --ignore-not-found 2>/dev/null || true
          kubectl delete stresschaos --all -n ${{ env.CHAOS_NAMESPACE }} --ignore-not-found 2>/dev/null || true
