name: Performance Test Only (Reusable)

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Nome do microserviço (catalogo, pagamento, pedido)'
        required: true
        type: string
      run_stress_spike_tests:
        description: 'Executar testes de stress e spike?'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  packages: write

env:
  SERVICE_NAME: ${{ inputs.service_name }}

jobs:
  performance-test:
    name: Performance Test (k6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone shared toolkit
        run: git clone --depth 1 https://github.com/Dorigao-LTDA/ct-common.git /tmp/ct-common

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Port-forward to AKS
        run: |
          kubectl port-forward -n app svc/${{ env.SERVICE_NAME }} 8080:8080 &
          PF_PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/health; then
              echo "Tunnel ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Tunnel failed to become ready after 30s" >&2
          exit 1

      - name: Generate k6 env from NFR
        run: |
          python3 /tmp/ct-common/scripts/nfr-to-env.py --nfr nfr.yaml --output nfr-env.sh --service ${{ env.SERVICE_NAME }}
          sed 's/^export //' nfr-env.sh > /tmp/k6-env.txt

      - name: Run k6 Smoke
        env:
          BASE_URL: http://localhost:8080
        run: |
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BASE_URL \
            --env-file /tmp/k6-env.txt \
            grafana/k6 run perf/smoke.js --out json=smoke-results.json --tag test_type=smoke

      - name: Run k6 Baseline
        env:
          BASE_URL: http://localhost:8080
        run: |
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BASE_URL \
            --env-file /tmp/k6-env.txt \
            grafana/k6 run perf/baseline.js --out json=baseline-results.json --tag test_type=baseline

      - name: Run k6 Stress
        if: ${{ inputs.run_stress_spike_tests == true }}
        continue-on-error: true
        env:
          BASE_URL: http://localhost:8080
        run: |
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BASE_URL \
            --env-file /tmp/k6-env.txt \
            grafana/k6 run perf/stress.js --out json=stress-results.json --tag test_type=stress

      - name: Run k6 Spike
        if: ${{ inputs.run_stress_spike_tests == true }}
        continue-on-error: true
        env:
          BASE_URL: http://localhost:8080
        run: |
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BASE_URL \
            --env-file /tmp/k6-env.txt \
            grafana/k6 run perf/spike.js --out json=spike-results.json --tag test_type=spike

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: |
            smoke-results.json
            baseline-results.json
            stress-results.json
            spike-results.json

      - name: Evaluate gates
        run: |
          python3 /tmp/ct-common/scripts/evaluate-gates.py \
            --artifacts . \
            --nfr nfr.yaml \
            --service ${{ env.SERVICE_NAME }}

      - name: Upload Gate Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-summary
          path: gate-summary.json
