name: CI/CD Pipeline (Reusable)

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Nome do microserviço (catalogo, pagamento, pedido)'
        required: true
        type: string
      run_stress_spike_tests:
        description: 'Executar testes de stress e spike?'
        required: false
        type: boolean
        default: false
      run_chaos_tests:
        description: 'Executar testes de resiliência?'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  packages: write

env:
  SERVICE_NAME: ${{ inputs.service_name }}
  IMAGE_NAME: ${{ vars.ACR_LOGIN_SERVER || 'acrctframework.azurecr.io' }}/${{ inputs.service_name }}

jobs:
  # =============================================
  # Stage 1: Build + Unit Tests + SAST
  # =============================================
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache OWASP Dependency Check database
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check
          key: ${{ runner.os }}-dependency-check-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-

      - name: Build
        run: mvn clean compile -B -q

      - name: Unit Tests
        run: mvn test -B

      - name: Coverage Report
        run: mvn jacoco:report -B

      - name: Check Coverage Threshold
        run: |
          COVERAGE=$(awk -F'[<>]' '/<counter type="LINE"/{for(i=1;i<=NF;i++) if($i~/COVERED/) print $(i+1)}' target/site/jacoco/jacoco.xml | head -1)
          MISSED=$(awk -F'[<>]' '/<counter type="LINE"/{for(i=1;i<=NF;i++) if($i~/MISSED/) print $(i+1)}' target/site/jacoco/jacoco.xml | head -1)
          TOTAL=$((COVERED + MISSED))
          if [ "$TOTAL" -gt 0 ]; then
            RATIO=$(echo "scale=2; $COVERED / $TOTAL * 100" | bc)
            echo "Line coverage: ${RATIO}%"
          fi

      # - name: SAST — OWASP Dependency Check
      #   env:
      #     NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      #   run: |
      #     mvn org.owasp:dependency-check-maven:check -B || true

  # =============================================
  # Stage 2: Build Docker Image + Push ACR
  # =============================================
  build-and-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ vars.ACR_NAME || 'acrctframework' }}

      - name: Build and Push Docker image
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          docker build -t ${{ env.IMAGE_NAME }}:$SHORT_SHA \
                       -t ${{ env.IMAGE_NAME }}:latest \
                       --build-arg BUILDKIT_INLINE_CACHE=1 .
          docker push ${{ env.IMAGE_NAME }}:$SHORT_SHA
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Image Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'  # Não quebrar por enquanto

  # =============================================
  # Stage 3: Trigger ArgoCD Sync
  # =============================================
  deploy:
    name: Deploy to AKS via ArgoCD
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Wait for ArgoCD
        run: |
          echo "Waiting for ArgoCD server to be ready..."
          for i in $(seq 1 30); do
            if kubectl get deployment argocd-server -n argocd &>/dev/null && \
               kubectl rollout status deployment/argocd-server -n argocd --timeout=10s &>/dev/null; then
              echo "ArgoCD server is ready"
              exit 0
            fi
            echo "Attempt $i/30: ArgoCD not ready yet..."
            sleep 10
          done
          echo "ERROR: ArgoCD server did not become ready after 5 minutes" >&2
          exit 1

      - name: Wait for Application
        run: |
          echo "Waiting for ArgoCD Application '${{ env.SERVICE_NAME }}' to exist..."
          for i in $(seq 1 30); do
            if kubectl get application ${{ env.SERVICE_NAME }} -n argocd &>/dev/null; then
              echo "Application '${{ env.SERVICE_NAME }}' exists"
              exit 0
            fi
            echo "Attempt $i/30: Application not found yet..."
            sleep 10
          done
          echo "ERROR: Application '${{ env.SERVICE_NAME }}' not found after 5 minutes" >&2
          echo "Ensure the root-app has synced and created the Application resource" >&2
          exit 1

      - name: Trigger ArgoCD Sync
        run: |
          kubectl patch application ${{ env.SERVICE_NAME }} -n argocd \
            -p '{"operation":{"sync":{"revision":"${{ github.sha }}"}}}' \
            --type=merge

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n app --timeout=300s

  # =============================================
  # Stage 4: Smoke Test
  # =============================================
  smoke-test:
    name: Smoke Test (k6)
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone shared toolkit
        run: git clone --depth 1 https://github.com/Dorigao-LTDA/ct-common.git /tmp/ct-common

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Port-forward to AKS
        run: |
          kubectl port-forward -n app svc/${{ env.SERVICE_NAME }} 8080:8080 &
          PF_PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/health; then
              echo "Tunnel ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Tunnel failed to become ready after 30s" >&2
          exit 1

      - name: Generate k6 env from NFR
        run: |
          python3 /tmp/ct-common/scripts/nfr-to-env.py --nfr nfr.yaml --output nfr-env.sh --service ${{ env.SERVICE_NAME }}
          sed 's/^export //' nfr-env.sh > /tmp/k6-env.txt

      - name: Run k6 Smoke
        env:
          BASE_URL: http://localhost:8080
        run: |
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BASE_URL \
            --env-file /tmp/k6-env.txt \
            grafana/k6 run perf/smoke.js --summary-export=smoke-results.json

      - name: Upload Smoke Results
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: smoke-results.json

  # =============================================
  # Stage 5: Performance Test (Baseline)
  # =============================================
  performance-test:
    name: Performance Test (k6)
    needs: [deploy, smoke-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone shared toolkit
        run: git clone --depth 1 https://github.com/Dorigao-LTDA/ct-common.git /tmp/ct-common

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Port-forward to AKS
        run: |
          kubectl port-forward -n app svc/${{ env.SERVICE_NAME }} 8080:8080 &
          PF_PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/health; then
              echo "Tunnel ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Tunnel failed to become ready after 30s" >&2
          exit 1

      - name: Generate k6 env from NFR
        run: |
          python3 /tmp/ct-common/scripts/nfr-to-env.py --nfr nfr.yaml --output nfr-env.sh --service ${{ env.SERVICE_NAME }}
          sed 's/^export //' nfr-env.sh > /tmp/k6-env.txt

      - name: Run k6 Baseline
        env:
          BASE_URL: http://localhost:8080
        run: |
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BASE_URL \
            --env-file /tmp/k6-env.txt \
            grafana/k6 run perf/baseline.js --summary-export=baseline-results.json --tag test_type=baseline

      - name: Run k6 Stress
        if: ${{ inputs.run_stress_spike_tests == true }}
        continue-on-error: true
        env:
          BASE_URL: http://localhost:8080
        run: |
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BASE_URL \
            --env-file /tmp/k6-env.txt \
            grafana/k6 run perf/stress.js --summary-export=stress-results.json --tag test_type=stress

      - name: Run k6 Spike
        if: ${{ inputs.run_stress_spike_tests == true }}
        continue-on-error: true
        env:
          BASE_URL: http://localhost:8080
        run: |
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BASE_URL \
            --env-file /tmp/k6-env.txt \
            grafana/k6 run perf/spike.js --summary-export=spike-results.json --tag test_type=spike

      - name: Upload Performance Results
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: |
            baseline-results.json
            stress-results.json
            spike-results.json

  # =============================================
  # Stage 6: Resilience Test
  # =============================================
  resilience-test:
    name: Resilience Test (Chaos)
    needs: [deploy, smoke-test, performance-test]
    runs-on: ubuntu-latest
    if: ${{ inputs.run_chaos_tests == true }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone shared toolkit
        run: git clone --depth 1 https://github.com/Dorigao-LTDA/ct-common.git /tmp/ct-common

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Generate k6 env from NFR
        run: |
          python3 /tmp/ct-common/scripts/nfr-to-env.py --nfr nfr.yaml --output nfr-env.sh --service ${{ env.SERVICE_NAME }}
          sed 's/^export //' nfr-env.sh > /tmp/k6-env.txt

      - name: Generate Chaos manifests from NFR
        run: |
          python3 /tmp/ct-common/scripts/nfr-to-chaos.py \
            --nfr nfr.yaml \
            --service ${{ env.SERVICE_NAME }} \
            --output-dir chaos-generated
          echo "Generated manifests:"
          ls -la chaos-generated/

      # ---------------------------------------------------------------
      # Helper: run one chaos experiment with k6 monitoring + recovery
      # ---------------------------------------------------------------
      - name: Write chaos runner script
        shell: bash
        run: |
          cat > /tmp/run-chaos-experiment.sh << 'RUNNER'
          #!/usr/bin/env bash
          set -euo pipefail
          #
          # run-chaos-experiment <manifest> <experiment_name> <duration_seconds>
          #
          # 1. Applies the chaos manifest
          # 2. Starts k6 smoke in background (traffic generator)
          # 3. Waits for chaos duration
          # 4. Stops k6
          # 5. Waits for pod recovery (polls until Ready)
          # 6. Records recovery_time_seconds
          # 7. Cleans up (deletes the manifest)
          # Writes: /tmp/chaos-results/<exp_name>.json, /tmp/chaos-recovery-times.txt
          #
          MANIFEST="$1"
          EXP_NAME="$2"
          DURATION="$3"
          SERVICE="$4"

          mkdir -p /tmp/chaos-results

          # Start k6 smoke in background as traffic generator
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e BASE_URL=http://localhost:8080 \
            --env-file /tmp/k6-env.txt \
            --name "k6-${EXP_NAME}" \
            grafana/k6 run perf/smoke.js \
              --summary-export=/tmp/chaos-results/${EXP_NAME}.json \
              --tag test_type=chaos \
              --tag chaos_experiment=${EXP_NAME} &
          K6_PID=$!

          # Allow k6 to reach service before chaos
          sleep 3

          # Apply chaos
          echo "=== Applying ${EXP_NAME} ==="
          kubectl apply -f "${MANIFEST}"

          # Wait for chaos duration
          echo "=== Waiting ${DURATION}s for chaos ${EXP_NAME} ==="
          sleep "${DURATION}"

          # Stop k6
          echo "=== Stopping k6 for ${EXP_NAME} ==="
          kill "${K6_PID}" 2>/dev/null || true
          wait "${K6_PID}" 2>/dev/null || true

          # Wait for all pods of this service to be Ready
          echo "=== Waiting for recovery after ${EXP_NAME} ==="
          RECOVERY_START=$(date +%s%N)
          for i in $(seq 1 120); do
            POD_STATUS=$(kubectl get pods -n app \
              -l app="${SERVICE}" \
              -o jsonpath='{.items[*].status.phase}' 2>/dev/null)
            ALL_RUNNING=true
            for status in $POD_STATUS; do
              if [ "$status" != "Running" ]; then ALL_RUNNING=false; break; fi
            done
            if $ALL_RUNNING; then
              ALL_READY=true
              READY_STATUS=$(kubectl get pods -n app \
                -l app="${SERVICE}" \
                -o jsonpath='{.items[*].status.containerStatuses[*].ready}' 2>/dev/null)
              for ready in $READY_STATUS; do
                if [ "$ready" != "true" ]; then ALL_READY=false; break; fi
              done
              if $ALL_READY; then
                RECOVERY_END=$(date +%s%N)
                RECOVERY_SEC=$(( (RECOVERY_END - RECOVERY_START) / 1000000000 ))
                echo "Recovery complete in ${RECOVERY_SEC}s"
                break
              fi
            fi
            sleep 2
          done

          # Cleanup chaos immediately so the next experiment starts clean
          echo "=== Cleaning up ${EXP_NAME} ==="
          kubectl delete -f "${MANIFEST}" --ignore-not-found --wait=true 2>/dev/null || true

          # Write recovery time
          RECOVERY_SEC=${RECOVERY_SEC:--1}
          echo "${EXP_NAME}: ${RECOVERY_SEC}s" >> /tmp/chaos-recovery-times.txt
          RUNNER

          chmod +x /tmp/run-chaos-experiment.sh

      - name: Port-forward to AKS (persistent)
        run: |
          kubectl port-forward -n app svc/${{ env.SERVICE_NAME }} 8080:8080 &
          PF_PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/health; then
              echo "Tunnel ready after ${i} attempts"
              echo "$PF_PID" > /tmp/pf-pid.txt
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Tunnel failed after 30s" >&2
          exit 1

      # =============================================================
      # Dynamic chaos experiments — iterate over generated manifests
      # =============================================================
      - name: Run all chaos experiments
        run: |
          jq -c '.experiments[]' chaos-generated/manifest-list.json | while read exp; do
            NAME=$(echo "$exp" | jq -r '.name')
            FILE=$(echo "$exp" | jq -r '.file')
            TYPE=$(echo "$exp" | jq -r '.type')
            echo "=== Running chaos experiment: $NAME (type=$TYPE) ==="
            /tmp/run-chaos-experiment.sh \
              "$FILE" \
              "$NAME" \
              "60" \
              "${{ env.SERVICE_NAME }}"
          done

      # =============================================================
      # Consolidate results
      # =============================================================
      - name: Consolidate chaos results
        run: |
          # Build recovery JSON from collected times
          RECOVERY_JSON="{"
          FIRST=true
          if [ -f /tmp/chaos-recovery-times.txt ]; then
            while IFS=':' read -r exp_name recovery_sec; do
              exp_name=$(echo "$exp_name" | xargs)
              recovery_sec=$(echo "$recovery_sec" | xargs | sed 's/s//')
              if [ "$FIRST" = true ]; then FIRST=false; else RECOVERY_JSON+=","; fi
              RECOVERY_JSON+="\"${exp_name}\": {\"recovery_time_seconds\": ${recovery_sec}}"
            done < /tmp/chaos-recovery-times.txt
          fi
          RECOVERY_JSON+="}"
          echo "$RECOVERY_JSON" > chaos-recovery.json
          echo "=== Recovery times ==="
          cat chaos-recovery.json

          # Merge per-experiment k6 summary exports into one NDJSON file
          if ls /tmp/chaos-results/*.json 2>/dev/null; then
            for f in /tmp/chaos-results/*.json; do
              [ -s "$f" ] && jq -c '.metrics | to_entries[] | {type: "Metric", metric: .key, data: {values: .value.values}}' "$f"
            done > chaos-results.json 2>/dev/null || true
          fi

      - name: Cleanup Chaos
        run: |
          # Kill any leftover k6 containers
          docker rm -f $(docker ps -aq --filter name=k6-) 2>/dev/null || true
          # Kill port-forward
          if [ -f /tmp/pf-pid.txt ]; then
            kill $(cat /tmp/pf-pid.txt) 2>/dev/null || true
          fi
          pkill -f "port-forward.*svc/${{ env.SERVICE_NAME }}" 2>/dev/null || true
          # Remove any leftover chaos resources
          kubectl delete podchaos --all -n app --ignore-not-found 2>/dev/null || true
          kubectl delete networkchaos --all -n app --ignore-not-found 2>/dev/null || true
          kubectl delete stresschaos --all -n app --ignore-not-found 2>/dev/null || true

      - name: Upload Chaos Results
        uses: actions/upload-artifact@v4
        with:
          name: chaos-results
          path: |
            chaos-results.json
            chaos-recovery.json

  # =============================================
  # Stage 7: Gate Evaluation
  # =============================================
  gate-evaluation:
    name: Gate Evaluation
    needs: [smoke-test, performance-test, resilience-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Clone shared toolkit
        run: git clone --depth 1 https://github.com/Dorigao-LTDA/ct-common.git /tmp/ct-common

      - name: Download all results
        uses: actions/download-artifact@v4

      - name: Validate against NFR
        run: |
          python3 /tmp/ct-common/scripts/evaluate-gates.py \
            --artifacts . \
            --nfr nfr.yaml \
            --service ${{ env.SERVICE_NAME }}

      - name: Upload Gate Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-summary
          path: gate-summary.json
